<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>福建省专业技术人员继续教育网络平台</title>
<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Microsoft Yahei", -apple-system, BlinkMacSystemFont, sans-serif;
}
body{
    background-color: #ffffff;
    margin: 0 auto;
    max-width: 750px; /* 手机移动端宽度限制，完美居中 */
}
/* 顶部蓝色通栏标题 */
.header-bar{
    width: 100%;
    background-color: #1677E8;
    color: #fff;
    font-size: 28px;
    text-align: center;
    padding: 38px 0;
    font-weight: 500;
}
/* 证书内容区域 居中缩进 */
.info-wrap{
    padding: 45px 8%;
    font-size: 23px;
    line-height: 2.4;
    color: #222;
}
/* 标题加粗样式 */
.info-wrap span{
    font-weight: 700;
}
/* 底部核验灰色卡片 */
.result-card{
    margin: 20px 3%;
    background-color: #f5f6f7;
    border-radius: 6px;
    padding: 50px 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
}
/* 绿色圆形对勾 */
.green-check{
    width: 82px;
    height: 82px;
    background-color: #52C41A;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
}
.green-check::after{
    content: "";
    width: 26px;
    height: 42px;
    border: solid #ffffff;
    border-width: 0 7px 7px 0;
    transform: rotate(45deg);
}
.result-txt{
    font-size: 24px;
    color: #333;
}
</style>
</head>
<body>
<!-- 顶部蓝色标题栏 -->
<div class="header-bar">证明详情</div>

<!-- 个人证书信息 -->
<div class="info-wrap">
    <div><span>姓名：</span>朱仕弘</div>
    <div><span>证件号：</span>350182199505213513</div>
    <div><span>单位：</span>福建晋旗建设有限公司</div>
    <div><span>年度：</span>2026</div>
    <div><span>科目类型：</span>公需科目</div>
    <div><span>学习形式：</span>网络培训</div>
    <div><span>培训学时：</span>30</div>
    <div><span>施训机构：</span>福建华博科技股份有限公司</div>
</div>

<!-- 核验通过区域 -->
<div class="result-card">
    <div class="green-check"></div>
    <div class="result-txt">核验通过</div>
</div>

</body>
</html>
